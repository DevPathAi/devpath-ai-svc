spring:
  application:
    name: devpath-ai-svc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devpath}
    username: ${DB_USER:devpath}
    password: ${DB_PASSWORD:localdev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: devpath-ai-review
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8080

devpath:
  auth:
    jwt-secret: ${JWT_SECRET:test-secret-please-change-min-32-bytes-long-0123456789}
  sandbox:
    base-url: ${SANDBOX_URI:http://localhost:8085}
    timeout: ${SANDBOX_TIMEOUT:PT5S}
  review:
    provider: ${REVIEW_PROVIDER:mock}
    ollama-model: ${REVIEW_OLLAMA_MODEL:qwen2.5-coder:7b}
    claude-model: ${REVIEW_CLAUDE_MODEL:claude-sonnet-4-6}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    gen-model: ${OLLAMA_GEN_MODEL:qwen2.5:7b}
    embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
    timeout: ${OLLAMA_TIMEOUT:PT8S}
  mentor:
    provider: ${MENTOR_PROVIDER:mock}
    claude-model: ${MENTOR_CLAUDE_MODEL:claude-sonnet-4-6}
    ollama-model: ${MENTOR_OLLAMA_MODEL:qwen2.5:7b}
    enabled: ${MENTOR_ENABLED:true}
    timeout: ${MENTOR_TIMEOUT:PT60S}
  learning:
    # 게이트웨이 미경유 내부 호출. 실제 주소는 LEARNING_URI로 주입(learning-svc server.port=8080 실측).
    # 로컬 단위/IT는 MockWebServer라 기본값 무관.
    base-url: ${LEARNING_URI:http://localhost:8081}
    timeout: ${LEARNING_TIMEOUT:PT5S}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
