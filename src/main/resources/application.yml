spring:
  application:
    name: devpath-ai-svc

server:
  port: 8080

devpath:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    gen-model: ${OLLAMA_GEN_MODEL:qwen2.5:7b}
    embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
    timeout: ${OLLAMA_TIMEOUT:PT8S}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
